name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  FLUTTER_VERSION: '3.32.8'
  PYTHON_VERSION: '3.10'

jobs:
  # Flutter Client Tests
  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client/personal_color_app

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Run code generation
      run: flutter packages pub run build_runner build --delete-conflicting-outputs

    - name: Analyze Flutter code
      run: flutter analyze

    - name: Run Flutter tests
      run: flutter test --coverage --test-randomize-ordering-seed random

    - name: Upload Flutter coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./client/personal_color_app/coverage/lcov.info
        flags: flutter
        name: flutter-coverage

  # Python Server Tests
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: personal-color-469007
      VERTEX_AI_LOCATION: asia-northeast1
      VERTEX_AI_MODEL: gemini-2.5-flash
      ENVIRONMENT: test
    defaults:
      run:
        working-directory: ./server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run Python tests with coverage
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing -v

    - name: Upload Python coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage.xml
        flags: python
        name: python-coverage
