name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  FLUTTER_VERSION: '3.24.0'
  PYTHON_VERSION: '3.10'

jobs:
  # Flutter Client Tests
  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Run code generation
      run: flutter packages pub run build_runner build --delete-conflicting-outputs

    - name: Analyze Flutter code
      run: flutter analyze

    - name: Check Flutter formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Run Flutter tests
      run: flutter test --coverage --test-randomize-ordering-seed random

    - name: Upload Flutter coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: flutter
        name: flutter-coverage

  # Python Server Tests
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run Python linting
      run: |
        pip install flake8 black isort
        flake8 src tests --max-line-length=88 --extend-ignore=E203,W503
        black --check src tests
        isort --check-only src tests

    - name: Run Python tests with coverage
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing -v

    - name: Upload Python coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage.xml
        flags: python
        name: python-coverage

  # Security Scans
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Python security check
      run: |
        cd server
        pip install safety bandit
        safety check --json --output safety-report.json || true
        bandit -r src -f json -o bandit-report.json || true

    - name: Flutter security check
      run: |
        flutter pub deps --json > deps.json
        # Check for known vulnerable packages
        echo "Checking Flutter dependencies for security issues..."

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [flutter-tests, python-tests]
    
    services:
      # Mock external services for testing
      mockserver:
        image: mockserver/mockserver:latest
        ports:
          - 1080:1080

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'

    - name: Install server dependencies
      run: |
        cd server
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Setup test environment
      run: |
        # Setup environment variables for testing
        export ENVIRONMENT=test
        export DEBUG=true
        export GOOGLE_CLOUD_PROJECT=test-project

    - name: Run integration tests
      run: |
        cd server
        pytest tests/integration/ -v --tb=short

    - name: Run API health check
      run: |
        cd server
        python -m pytest tests/integration/test_e2e_diagnosis.py::TestE2EDiagnosis::test_health_check_integration -v

  # Build and Package
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [flutter-tests, python-tests, security-scan]
    if: github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'

    - name: Build Flutter App (Android APK)
      run: |
        flutter pub get
        flutter packages pub run build_runner build --delete-conflicting-outputs
        flutter build apk --release

    - name: Build Flutter App (iOS - if macOS runner)
      run: |
        echo "iOS build would require macOS runner with Xcode"

    - name: Setup Python for server build
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Build Python server package
      run: |
        cd server
        pip install build wheel
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          build/app/outputs/flutter-apk/
          server/dist/

  # Deployment (Production)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy server to GCP
      run: |
        echo "Server deployment to GCP would be configured here"
        echo "This would typically involve:"
        echo "1. Authenticating with GCP"
        echo "2. Building Docker image"
        echo "3. Deploying to Cloud Run or GKE"
        echo "4. Updating environment variables"

    - name: Deploy Flutter app
      run: |
        echo "Flutter app deployment would be configured here"
        echo "This would typically involve:"
        echo "1. Publishing to Google Play Store (Android)"
        echo "2. Publishing to Apple App Store (iOS)"

    - name: Run post-deployment health checks
      run: |
        echo "Running post-deployment health checks..."
        # curl -f https://production-api-url/health || exit 1

    - name: Notify deployment status
      run: |
        echo "Deployment completed successfully"
        # Could integrate with Slack, Discord, or other notification systems

  # Performance Tests (Optional)
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup performance testing tools
      run: |
        # Install k6 or other performance testing tools
        echo "Performance testing setup"

    - name: Run API performance tests
      run: |
        echo "Running API performance tests..."
        echo "This would test API response times, throughput, etc."

    - name: Run Flutter app performance tests
      run: |
        echo "Running Flutter performance tests..."
        echo "This would test app startup time, memory usage, etc."

# Workflow Status Notification
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [flutter-tests, python-tests, security-scan, integration-tests]
    if: always()

    steps:
    - name: Notify workflow status
      run: |
        if [[ "${{ needs.flutter-tests.result }}" == "success" && 
              "${{ needs.python-tests.result }}" == "success" && 
              "${{ needs.security-scan.result }}" == "success" && 
              "${{ needs.integration-tests.result }}" == "success" ]]; then
          echo "✅ All tests passed successfully!"
        else
          echo "❌ Some tests failed. Please check the logs."
          exit 1
        fi