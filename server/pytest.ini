[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    --verbose
    --tb=short
    --strict-markers

# Async test support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    security: Security-related tests
    performance: Performance tests
    import_check: Import consistency tests
    docker_config: Docker configuration tests
    app_startup: Application startup tests
    pre_deploy: Pre-deployment validation tests

# Minimum coverage percentage
minversion = 7.0

# Test timeout (in seconds)
timeout = 300

# Parallel execution
# addopts = -n auto  # Uncomment to enable parallel test execution