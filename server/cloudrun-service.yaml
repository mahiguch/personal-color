apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: personal-color-api
  labels:
    app: personal-color-api
    environment: production
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      labels:
        app: personal-color-api
        version: v1
      annotations:
        # Cloud Run configuration
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      serviceAccountName: personal-color-api-sa
      containers:
      - name: personal-color-api
        image: gcr.io/PROJECT_ID/personal-color-api:latest
        ports:
        - name: http1
          containerPort: 8000
        env:
        # Application Settings
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: HOST
          value: "0.0.0.0"
        # Google Cloud Configuration
        - name: GOOGLE_CLOUD_PROJECT
          value: "personal-color-469007"
        - name: VERTEX_AI_LOCATION
          value: "asia-northeast1"
        - name: GEMINI_MODEL_NAME
          value: "gemini-2.5-flash"
        # CORS Settings
        - name: ALLOWED_ORIGINS
          value: "*"
        # API Configuration
        - name: MAX_IMAGE_SIZE_MB
          value: "10"
        - name: REQUEST_TIMEOUT_SECONDS
          value: "30"
        - name: MAX_RETRY_ATTEMPTS
          value: "3"
        # Security Settings
        - name: API_KEY
          value: "11A77CCB-4FA0-4CB8-A1FC-E331EAA24B2E"
        - name: RATE_LIMIT_PER_MINUTE
          value: "60"
        # Rate Limiting (detailed)
        - name: RATE_LIMIT_DEFAULT
          value: "60"
        - name: RATE_LIMIT_DIAGNOSIS
          value: "10"
        - name: RATE_LIMIT_BURST
          value: "5"
        # Performance Settings
        - name: WORKER_COUNT
          value: "4"
        - name: MAX_CONCURRENT_REQUESTS
          value: "100"
        # Logging Configuration
        - name: LOG_LEVEL
          value: "INFO"
        # Monitoring Settings
        - name: ENABLE_METRICS
          value: "true"
        - name: ENABLE_TRACING
          value: "true"
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/v1/diagnose/test
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3

