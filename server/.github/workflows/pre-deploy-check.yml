name: Pre-Deploy Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  pre-deploy-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        cd server
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install flake8 mypy safety
    
    - name: Run pre-deploy check
      run: |
        cd server
        chmod +x scripts/pre_deploy_check.sh
        ./scripts/pre_deploy_check.sh
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: server/test-results/
    
    - name: Comment PR with results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request' && failure()
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🚫 **デプロイ前チェックが失敗しました**\n\n詳細はActionsログを確認してください。修正後に再度プッシュしてください。'
          })

  docker-build-test:
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        cd server
        docker build --target production -t personal-color-api:test .
    
    - name: Test Docker container startup
      run: |
        cd server
        # バックグラウンドでコンテナを起動
        docker run -d --name test-container -p 8080:8080 \
          -e ENVIRONMENT=test \
          -e GOOGLE_CLOUD_PROJECT=test-project \
          -e VERTEX_AI_LOCATION=us-central1 \
          personal-color-api:test
        
        # コンテナが起動するまで待機
        sleep 30
        
        # ヘルスチェックエンドポイントをテスト
        if curl -f http://localhost:8080/api/v1/diagnose/test; then
          echo "✅ コンテナの起動とヘルスチェックに成功"
        else
          echo "❌ コンテナの起動またはヘルスチェックに失敗"
          docker logs test-container
          exit 1
        fi
        
        # コンテナを停止・削除
        docker stop test-container
        docker rm test-container