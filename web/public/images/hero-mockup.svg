<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8a364"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="appIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background phone outline (rotated) -->
  <g transform="rotate(12 200 200)">
    <rect x="80" y="60" width="240" height="280" rx="32" fill="url(#phoneGradient)" opacity="0.2"/>
  </g>
  
  <!-- Phone screen -->
  <rect x="100" y="80" width="200" height="240" rx="24" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- App interface mockup -->
  <g transform="translate(125, 110)">
    <!-- App icon -->
    <circle cx="75" cy="40" r="32" fill="url(#appIconGradient)"/>
    <text x="75" y="50" 
          font-family="Inter, sans-serif" 
          font-size="24" 
          font-weight="bold" 
          fill="white" 
          text-anchor="middle">P</text>
    
    <!-- App title -->
    <text x="75" y="88" 
          font-family="Inter, sans-serif" 
          font-size="14" 
          font-weight="600" 
          fill="#1f2937" 
          text-anchor="middle">パーソナルカラー診断</text>
    
    <!-- Subtitle -->
    <text x="75" y="104" 
          font-family="Inter, sans-serif" 
          font-size="10" 
          fill="#6b7280" 
          text-anchor="middle">AI による色診断アプリ</text>
    
    <!-- Color palette -->
    <g transform="translate(51, 120)">
      <circle cx="0" cy="0" r="12" fill="#fbbf24"/>
      <circle cx="16" cy="0" r="12" fill="#ec4899"/>
      <circle cx="32" cy="0" r="12" fill="#f97316"/>
      <circle cx="48" cy="0" r="12" fill="#3b82f6"/>
    </g>
    
    <!-- Diagnosis button mockup -->
    <rect x="25" y="150" width="100" height="32" rx="16" fill="#f97316"/>
    <text x="75" y="170" 
          font-family="Inter, sans-serif" 
          font-size="12" 
          font-weight="500" 
          fill="white" 
          text-anchor="middle">診断開始</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="350" cy="80" r="6" fill="#3b82f6" opacity="0.6"/>
  <circle cx="60" cy="320" r="5" fill="#ec4899" opacity="0.6"/>
  <circle cx="340" cy="300" r="7" fill="#06b6d4" opacity="0.6"/>
</svg>